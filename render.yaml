services:
  # Django Backend
  - type: web
    name: cgmd-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn cgmd_backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SETTINGS_MODULE
        value: cgmd_backend.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        sync: false  # You'll set this manually with your Supabase connection string
      - key: CORS_ALLOWED_ORIGINS
        value: https://jessewashburn.github.io

  # React Frontend
  - type: static
    name: cgmd-frontend
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://cgmd-backend.onrender.com/api
