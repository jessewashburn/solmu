<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Overlapping guitar string loops">
  <g fill="none" stroke="#950500" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- first loop -->
    <circle cx="256" cy="256" r="150" stroke-width="12"></circle>

    <!-- second loop, subtle offset -->
    <circle cx="268" cy="244" r="150" stroke-width="12"></circle>

  </g>
</svg>
